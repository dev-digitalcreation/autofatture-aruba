      <stop offset="0" stop-color="#34C77B"/>
      <stop offset="1" stop-color="#1C7A52"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#g)"/>
  <!-- anello (reverse / ciclo) -->
